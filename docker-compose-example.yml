services:
  afip-services-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: afip-services-api:latest
    container_name: afip_services_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # Mount your AFIP cert/key into /app/credentials (paths configured via .env)
      - ./credentials:/app/credentials:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
