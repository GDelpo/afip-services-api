{% extends "base.html" %}

{% block title %}Ingresar · {{ app_name }}{% endblock %}

{% block body %}
<div class="min-h-full flex items-center justify-center p-6">
    <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg border border-slate-200 p-8">
        <div class="mb-6 text-center">
            <div class="mx-auto h-12 w-12 flex items-center justify-center rounded-xl bg-slate-900 text-white text-xl font-bold">A</div>
            <h1 class="mt-3 text-xl font-semibold">{{ app_name }}</h1>
            <p class="mt-1 text-sm text-slate-500">Dashboard administrativo</p>
        </div>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700">Usuario</label>
                <input type="text" name="username" autocomplete="username" required
                       class="mt-1 w-full rounded-lg border-slate-300 border px-3 py-2 text-sm focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none" />
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Contraseña</label>
                <input type="password" name="password" autocomplete="current-password" required
                       class="mt-1 w-full rounded-lg border-slate-300 border px-3 py-2 text-sm focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none" />
            </div>
            <button type="submit"
                    class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2 rounded-lg text-sm transition">
                Ingresar
            </button>
            <p id="login-error" class="text-red-600 text-sm text-center hidden"></p>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    (function () {
        const form = document.getElementById("login-form");
        const errEl = document.getElementById("login-error");
        form.addEventListener("submit", async (ev) => {
            ev.preventDefault();
            errEl.classList.add("hidden");
            const fd = new FormData(form);
            try {
                const res = await fetch("{{ api_prefix }}/token", {
                    method: "POST",
                    body: fd,
                });
                if (!res.ok) throw new Error("Credenciales inválidas");
                const data = await res.json();
                const token = data.accessToken || data.access_token;
                if (!token) throw new Error("Respuesta sin token");
                localStorage.setItem("afip_token", token);
                localStorage.setItem("afip_user", fd.get("username"));
                window.location.href = "/dashboard";
            } catch (e) {
                errEl.textContent = e.message || "Error al autenticar";
                errEl.classList.remove("hidden");
            }
        });
    })();
</script>
{% endblock %}
